name: flutter-ci

on:
  push:
    branches:
      - main
    paths:
      - 'apps/mobile/**'
      - 'functions/**'
      - '.github/workflows/flutter-ci.yml'
  pull_request:
    paths:
      - 'apps/mobile/**'
      - 'functions/**'
      - '.github/workflows/flutter-ci.yml'
  workflow_dispatch:

jobs:
  flutter:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Get Flutter Dependencies
        run: flutter pub get
        working-directory: apps/mobile

      - name: Analyze
        run: flutter analyze
        working-directory: apps/mobile

      - name: Format Check
        run: flutter format --set-exit-if-changed .
        working-directory: apps/mobile

      - name: Test
        run: flutter test
        working-directory: apps/mobile

      - name: Build APK
        run: flutter build apk --release
        working-directory: apps/mobile
