name: Deploy Supabase Functions

on:
  push:
    branches: [main]
    paths:
      - 'supabase/**'
      - '.github/workflows/supabase-deploy.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy-functions:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Check Supabase deploy secrets
        id: secrets
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
        run: |
          if [ -n "$SUPABASE_ACCESS_TOKEN" ] && [ -n "$SUPABASE_PROJECT_ID" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Setup Supabase CLI
        if: steps.secrets.outputs.available == 'true'
        uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Deploy launch functions
        if: steps.secrets.outputs.available == 'true'
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
        run: |
          supabase functions deploy finance-core --project-ref "$SUPABASE_PROJECT_ID"
          supabase functions deploy chat --project-ref "$SUPABASE_PROJECT_ID"
          supabase functions deploy agent-cycle --project-ref "$SUPABASE_PROJECT_ID"
      - name: Skip deploy without secrets
        if: steps.secrets.outputs.available != 'true'
        run: echo "SUPABASE_ACCESS_TOKEN or SUPABASE_PROJECT_ID is missing; skipping Supabase function deploy."
